services:
  - type: web
    name: life-tracker
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: DATABASE_PATH
        value: /var/data/lifetracker.db
      - key: UPLOAD_FOLDER
        value: /var/data/uploads
      - key: SECRET_KEY
        generateValue: true
    disk:
      name: life-tracker-data
      mountPath: /var/data
      sizeGB: 2
