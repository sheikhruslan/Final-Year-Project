services:
  - type: web
    name: life-tracker
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    envVars:
      - key: DATABASE_PATH
        value: /var/data/lifetracker.db
      - key: UPLOAD_FOLDER
        value: /var/data/uploads
      - key: SECRET_KEY
        generateValue: true
    disk:
      name: life-tracker-data
      mountPath: /var/data
      sizeGB: 2
